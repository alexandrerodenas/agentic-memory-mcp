# plugin.yaml — Hermes Plugin Manifest for agentic-memory-mcp
manifest_version: 1
name: agentic-memory-mcp
version: "0.7.0"
description: Knowledge Graph memory provider for Hermes Agent — persistent, scored, local.
author: Alexandre Rodenas
homepage: https://github.com/alexandrerodenas/agentic-memory-mcp
requires_env: []

provides_memory_provider: true

provides_tools:
  - memory_node_add
  - memory_node_get
  - memory_node_update
  - memory_node_delete
  - memory_edge_add
  - memory_edge_delete
  - memory_retrieve
  - memory_corroborate
  - memory_stats
  - memory_export
  - memory_import
  - memory_prune

provides_skills:
  - agentic-memory

hooks:
  - on_memory_write
